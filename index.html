<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adet Fiyat Karşılaştırma</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#ffffff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
    width:100%;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#3d4f66;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}

.field-container input[type="text"]{
    width:100%;
    min-width:0;
}

input[type="text"]{
    flex:1;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    background:#fff;
    padding:0 14px;
    font-size:16px;
    text-align:center;
    transition:0.2s;
}

input[type="text"]:focus{
    outline:none;
    border-color:#57c785;
}

.yellow-bg{
    background:#f7eb75 !important;
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
}

.clear-btn:hover{
    background:#2587ca;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:0.2s;
}

button:hover{
    background:#28b765;
}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    border-radius:10px;
    padding:18px;
}

.result p{
    margin:12px 0;
    color:#2c3e50;
    font-size:15px;
}

.highlight{
    float:right;
    font-weight:bold;
}

.final-box{
    background:#d4efdf;
    padding:14px;
    border-radius:8px;
    margin-top:12px;
    border-left:5px solid #2ecc71;
}

.green{
    color:#27ae60;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">

<label>Kutu Ürün Fiyatı</label>

<div class="field-container">
<input type="text" id="kutuFiyat">
<div class="clear-btn" onclick="temizleKutu('kutuFiyat')">×</div>
</div>

</div>

<div class="input-group">

<label>Kutu İçindeki Adet</label>

<div class="field-container">
<input type="text" id="adet" class="yellow-bg">
<div class="clear-btn" onclick="temizleKutu('adet')">×</div>
</div>

</div>

<div class="input-group">

<label>Tekli Ürün Satış Fiyatı</label>

<div class="field-container">
<input type="text" id="tekliFiyat">
<div class="clear-btn" onclick="temizleKutu('tekliFiyat')">×</div>
</div>

</div>

<button onclick="hesapla()">
Karşılaştırmayı Hesapla
</button>

<div class="result" id="sonucAlani">

<p>
Kutu İçinden Çıkan 1 Adet Fiyatı
<span class="highlight" id="resAdetFiyat">0,00 TL</span>
</p>

<p>
Tekli Barkod Satış Fiyatı
<span class="highlight" id="resTekli">0,00 TL</span>
</p>

<div class="final-box">

<p class="green">
Kutu Avantajı
<span class="highlight" id="resIndirim">%0,00</span>
</p>

</div>

</div>

</div>

<script>

function temizleKutu(id){

    document.getElementById(id).value = "";

}

function sayiyaCevir(id){

    let value = document.getElementById(id).value.trim();

    if(value === ""){
        return 0;
    }

    value = value.replace(/\./g,"").replace(",",".");

    let sayi = parseFloat(value);

    return isNaN(sayi) ? 0 : sayi;
}

function hesapla(){

    let kutuFiyat = sayiyaCevir("kutuFiyat");
    let adet = sayiyaCevir("adet");
    let tekliFiyat = sayiyaCevir("tekliFiyat");

    if(kutuFiyat <= 0){

        alert("Kutu fiyatını giriniz.");
        return;

    }

    if(adet <= 0){

        alert("Adet bilgisi giriniz.");
        return;

    }

    if(tekliFiyat <= 0){

        alert("Tekli ürün fiyatını giriniz.");
        return;

    }

    let adetFiyati = kutuFiyat / adet;

    let indirimOrani =
        ((tekliFiyat - adetFiyati) / tekliFiyat) * 100;

    let fmt = {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    };

    document.getElementById("resAdetFiyat").innerText =
        adetFiyati.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resTekli").innerText =
        tekliFiyat.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resIndirim").innerText =
        "%" + indirimOrani.toLocaleString("tr-TR",fmt);

    document.getElementById("sonucAlani").style.display = "block";

}

document.querySelectorAll("input").forEach(function(input){

    input.addEventListener("keydown",function(e){

        if(e.key === "Enter"){

            e.preventDefault();
            hesapla();

        }

    });

});

</script>

</body>
</html>
