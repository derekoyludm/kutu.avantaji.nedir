<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<!-- 🟢 Mobil cihazlarda veri girerken otomatik yakınlaşmayı (zoom) kesin olarak engelleyen meta etiket -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, user-scalable=no">

<title>Adet Fiyat Karşılaştırma</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height: 100vh; /* Ekranı tam kaplayarak dikeyde de ortalar */
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    margin: auto;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#3d4f66;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
}

input{
    flex:1;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    background:#fff;
    padding:0 14px;
    font-size:16px; /* 🟢 Yakınlaşmayı önleyen kritik sınır (Minimum 16px) */
    text-align:center;
    transition:.15s;
}

/* 🟢 Odaklanıldığında tarayıcının yazı boyutunu küçültüp yakınlaşma yapmasını engelleme */
input:focus{
    outline:none;
    font-size:16px !important;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    flex-shrink:0;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    width:100%;
    height:50px;
    border-radius:8px;
    border:1.5px solid #c9d2dc;
    background:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.15s;
    color:#2c3e50;
}

button:focus{
    outline:none;
    box-shadow:none;
}

button:focus-visible{
    outline:none;
    box-shadow:none;
}

/* 🟢 HESAPLA AKTİF */
button.active-calc{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

/* 🔴 RESET AKTİF */
button.active-reset{
    border-color:#e74c3c !important;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35) !important;
}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    border-radius:10px;
    padding:18px;
}

.result p{
    margin:12px 0;
    color:#2c3e50;
    font-size:15px;
}

.highlight{
    float:right;
    font-weight:bold;
}

.final-box{
    background:#d4efdf;
    padding:14px;
    border-radius:8px;
    margin-top:12px;
    border-left:5px solid #2ecc71;
}

.green{
    color:#27ae60;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Kutu Ürün Fiyatı</label>
<div class="field-container">
<!-- 🟢 iPhone klavyesinde hem virgülü hem de Enter (Git) tuşunu açan modern inputmode yapısı -->
<input id="kutuFiyat" type="text" inputmode="decimal">
<div class="clear-btn" ontouchstart="temizle(event, 'kutuFiyat')" onclick="temizle(event, 'kutuFiyat')">×</div>
</div>
</div>

<div class="input-group">
<label>Kutu İçindeki Adet</label>
<div class="field-container">
<input id="adet" type="text" inputmode="decimal">
<div class="clear-btn" ontouchstart="temizle(event, 'adet')" onclick="temizle(event, 'adet')">×</div>
</div>
</div>

<div class="input-group">
<label>Tekli Ürün Satış Fiyatı</label>
<div class="field-container">
<input id="tekliFiyat" type="text" inputmode="decimal">
<div class="clear-btn" ontouchstart="temizle(event, 'tekliFiyat')" onclick="temizle(event, 'tekliFiyat')">×</div>
</div>
</div>

<div class="button-row">

<button id="hesaplaBtn" onclick="hesapla()">
Hesapla
</button>

<button id="resetBtn" onclick="resetAll(event)">
↺
</button>

</div>

<div class="result" id="sonucAlani">

<p>
Kutu 1 Adet Fiyat
<span class="highlight" id="resAdetFiyat"></span>
</p>

<p>
Tekli Fiyat
<span class="highlight" id="resTekli"></span>
</p>

<div class="final-box">
<p class="green">
Kutu Avantajı
<span class="highlight" id="resIndirim"></span>
</p>
</div>

</div>

</div>

<script>

/* 📱 KLAVYEYİ VE ODAĞI KAYBETTİRMEYEN MODERN TEMİZLEME FONKSİYONU */
function temizle(e, id){
    e.preventDefault();
    e.stopPropagation();

    let el = document.getElementById(id);
    el.value = "";
    
    resetState();

    setTimeout(() => {
        el.focus();
        if(typeof el.setSelectionRange === "function") {
            el.setSelectionRange(0, 0); 
        }
    }, 40);
}

function sayiyaCevir(id){
    let v = document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(",", ".")) || 0;
}

/* 🟢 HESAPLA */
function hesapla(){
    let kutuFiyat = sayiyaCevir("kutuFiyat");
    let adet = sayiyaCevir("adet");
    let tekliFiyat = sayiyaCevir("tekliFiyat");

    // Değerler boş veya sıfır olsa dahi hata vermemesi için güvenli hesaplama kontrolleri
    let adetFiyat = adet > 0 ? (kutuFiyat / adet) : 0;
    let indirim = tekliFiyat > 0 ? (((tekliFiyat - adetFiyat) / tekliFiyat) * 100) : 0;

    document.getElementById("resAdetFiyat").innerText =
        adetFiyat.toFixed(2) + " TL";

    document.getElementById("resTekli").innerText =
        tekliFiyat.toFixed(2) + " TL";

    document.getElementById("resIndirim").innerText =
        "%" + indirim.toFixed(2);

    // 🟢 Koşul aranmaksızın sonuç alanı görünür hale getirilir
    document.getElementById("sonucAlani").style.display = "block";
    document.getElementById("hesaplaBtn").classList.add("active-calc");
    document.getElementById("resetBtn").classList.remove("active-reset");

    /* 🔥 ODAK TEMİZLEME */
    document.querySelectorAll("input").forEach(i => {
        i.blur();
    });
}

/* 🔴 RESET */
function resetAll(e){
    if(e) e.preventDefault();

    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("sonucAlani").style.display = "none";

    document.getElementById("resetBtn").classList.add("active-reset");
    document.getElementById("hesaplaBtn").classList.remove("active-calc");
}

/* RESET STATE */
function resetState(){
    document.getElementById("resetBtn").classList.remove("active-reset");
    document.getElementById("hesaplaBtn").classList.remove("active-calc");
    document.getElementById("sonucAlani").style.display = "none";
}

/* INPUT EVENTLERİ VE OTOMATİK SEÇME */
document.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", () => {
        resetState();
    });

    // Kutunun içine tıklandığında mevcut yazıyı otomatik seçer
    i.addEventListener("focus", () => {
        setTimeout(() => { i.select(); }, 50);
    });
});

/* ENTER NAV + FIX */
document.querySelectorAll("input").forEach((input, index, list) => {
    input.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
            e.preventDefault();
            resetState();

            let next = list[index + 1];

            if(next){
                setTimeout(() => {
                    next.focus();
                    next.select();
                }, 0);
            } else {
                hesapla();
            }
        }
    });
});

</script>

</body>
</html>
